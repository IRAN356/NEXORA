<!DOCTYPE html>
<html lang="fa">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NAXORA</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- صفحه شروع -->
  <section id="home">
    <h1>✨ NAXORA</h1>
    <p>مدیریت کارها، تمرکز، و برنامه‌ریزی حرفه‌ای</p>
    <button id="startBtn">شروع تجربه</button>
  </section>

  <!-- اپ -->
  <section id="app" class="hidden">
    
    <header>
      <h2>📋 مدیریت کارها</h2>
    </header>

    <div class="task-box">
      <input id="taskInput" placeholder="کار جدید بنویس...">
      <button id="addTask">افزودن</button>
    </div>

    <ul id="taskList"></ul>

    <div class="timer">
      <h3>⏱ تایمر تمرکز</h3>
      <p id="time">25:00</p>
      <button id="startTimer">شروع</button>
    </div>

  </section>

<script src="app.js"></script>
</body>
</html>
