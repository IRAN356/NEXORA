<!DOCTYPE html>
<html lang="fa">
<head>
  <meta charset="UTF-8">
  <title>NAXORA</title>

  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      background: linear-gradient(135deg, #1e1e2f, #3a3a6a);
      color: white;
      text-align: center;
    }

    header {
      padding: 30px;
      font-size: 28px;
      font-weight: bold;
    }

    .box {
      margin: 30px auto;
      padding: 20px;
      width: 90%;
      max-width: 400px;
      background: rgba(255,255,255,0.1);
      border-radius: 20px;
      backdrop-filter: blur(10px);
    }

    input {
      width: 90%;
      padding: 10px;
      border-radius: 10px;
      border: none;
      margin-top: 10px;
    }

    button {
      margin-top: 15px;
      padding: 10px 20px;
      border: none;
      border-radius: 10px;
      background: #00c3ff;
      color: black;
      font-weight: bold;
      cursor: pointer;
    }

    .tasks {
      margin-top: 20px;
      text-align: right;
    }

    .task {
      background: rgba(0,0,0,0.3);
      padding: 10px;
      border-radius: 10px;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<header>🔥 NAXORA</header>

<div class="box">
  <h3>➕ اضافه کردن کار</h3>
  <input id="taskInput" placeholder="مثلا: ساعت 7 بیدار شم">
  <br>
  <button onclick="addTask()">ثبت</button>

  <div class="tasks" id="taskList"></div>
</div>

<script>
function addTask() {
  let input = document.getElementById("taskInput");
  let text = input.value;

  if (text === "") return;

  let div = document.createElement("div");
  div.className = "task";
  div.innerText = text;

  document.getElementById("taskList").appendChild(div);

  input.value = "";
}
</script>

</body>
</html>
