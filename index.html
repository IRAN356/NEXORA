<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FocusFlow Pro</title>

<style>
body {
    margin:0;
    font-family:sans-serif;
    background:#0f172a;
    color:white;
    text-align:center;
}

h1 { margin-top:20px; }

.container { margin-top:20px; }

input {
    padding:10px;
    border-radius:10px;
    border:none;
    margin:5px;
}

button {
    padding:10px;
    border:none;
    border-radius:10px;
    background:#22c55e;
    color:white;
    cursor:pointer;
}

.task {
    background:#1e293b;
    margin:10px;
    padding:10px;
    border-radius:10px;
}
</style>

</head>

<body>

<h1>🚀 FocusFlow Pro</h1>

<div class="container">
    <input id="text" placeholder="کارتو بنویس...">
    <input type="date" id="date">
    <input type="time" id="time">
    <br>
    <button onclick="addTask()">افزودن</button>
</div>

<div id="list"></div>

<script>
let tasks = JSON.parse(localStorage.getItem("tasks")) || [];

function addTask(){
    let text = document.getElementById("text").value;
    let date = document.getElementById("date").value;
    let time = document.getElementById("time").value;

    if(!text) return;

    tasks.push({text, date, time, done:false});
    save();
    render();
}

function render(){
    let list = document.getElementById("list");
    list.innerHTML="";

    tasks.forEach((t,i)=>{
        let div = document.createElement("div");
        div.className="task";

        div.innerHTML = `
            <b onclick="toggle(${i})" style="${t.done?'text-decoration:line-through':''}">
                ${t.text}
            </b><br>
            📅 ${t.date || "-"} ⏰ ${t.time || "-"}<br><br>
            <button onclick="removeTask(${i})">حذف</button>
        `;

        list.appendChild(div);

        checkReminder(t);
    });
}

function removeTask(i){
    tasks.splice(i,1);
    save();
    render();
}

function toggle(i){
    tasks[i].done = !tasks[i].done;
    save();
    render();
}

function save(){
    localStorage.setItem("tasks", JSON.stringify(tasks));
}

function checkReminder(task){
    if(!task.date || !task.time) return;

    let now = new Date();
    let taskTime = new Date(task.date + "T" + task.time);

    if(taskTime > now){
        let diff = taskTime - now;

        setTimeout(()=>{
            alert("⏰ وقتشه: " + task.text);
        }, diff);
    }
}

render();
</script>

</body>
</html>
